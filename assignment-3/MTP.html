<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Ticket Pricing</title>
</head>
<body>
    <h2>Movie Ticket Pricing</h2>
    <label>Age:</label> <input type="number" id="age"><br><br>
    <label>Show Time (24hr format):</label> <input type="number" id="showTime"><br><br>
    <button onclick="calculateTicket()">Check Price</button>
    <h3 id="result"></h3>

    <script>
        function calculateTicketPrice(age, showTime) {
            let price = 12;
            if (showTime < 17) price *= 0.8;
            if (age > 60) price *= 0.7;
            if (age < 12) price *= 0.6;
            return `Final Ticket Price: $${price.toFixed(2)}`;
        }

        function calculateTicket() {
            let age = parseFloat(document.getElementById("age").value);
            let showTime = parseFloat(document.getElementById("showTime").value);
            document.getElementById("result").innerText = calculateTicketPrice(age, showTime);
        }
    </script>
</body>
</html>
