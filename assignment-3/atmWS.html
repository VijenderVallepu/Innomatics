<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Withdrawal</title>
</head>
<body>
    <h2>ATM Withdrawal System</h2>
    <label>Balance:</label> <input type="number" id="balance"><br><br>
    <label>Amount:</label> <input type="number" id="amount"><br><br>
    <label>Set PIN:</label> <input type="password" id="pin"><br><br>
    <label>Enter PIN:</label> <input type="password" id="enteredPin"><br><br>
    <button onclick="executeWithdrawal()">Withdraw</button>
    <h3 id="result"></h3>

    <script>
        function atmWithdrawal(balance, amount, pin, enteredPin) {
            if (enteredPin !== pin) return "Incorrect PIN";
            if (amount > balance) return "Insufficient Funds";
            if (amount % 100 !== 0) return "Enter amount in multiples of 100";
            return `Withdrawal Successful. Remaining Balance: ${balance - amount}`;
        }

        function executeWithdrawal() {
            let balance = parseFloat(document.getElementById("balance").value);
            let amount = parseFloat(document.getElementById("amount").value);
            let pin = document.getElementById("pin").value;
            let enteredPin = document.getElementById("enteredPin").value;

            document.getElementById("result").innerText = atmWithdrawal(balance, amount, pin, enteredPin);
        }
    </script>
</body>
</html>
